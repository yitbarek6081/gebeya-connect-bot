<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gebeya Connect - የገበያ ዝርዝር</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* የሚያምረው የዕቃ ካርድ */
        .product-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }

        /* የምስል ክፍል */
        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        /* የመረጃ ክፍል */
        .product-info {
            padding: 20px;
        }

        h1 {
            color: #333;
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 10px;
            border-bottom: 2px solid #0088cc;
            display: inline-block;
            padding-bottom: 5px;
        }

        .product-detail {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            color: #555;
            font-size: 1.1rem;
        }

        .detail-icon {
            color: #0088cc;
            font-size: 1.3rem;
            margin-right: 15px;
            width: 25px;
            text-align: center;
        }

        .price {
            background-color: #fff9db;
            color: #fcc419;
            padding: 5px 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* የቁልፎች ክፍል */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        .btn-call {
            background-color: #2ecc71;
            color: white;
        }

        .btn-call:hover { background-color: #27ae60; }

        .btn-msg {
            background-color: #0088cc;
            color: white;
        }

        .btn-msg:hover { background-color: #006699; }

    </style>
</head>
<body>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?ixlib=rb-4.0.3" alt="House Image" class="product-image">
        
        <div class="product-info">
            <h1>🏠 ዘመናዊ መኖሪያ ቤት</h1>
            
            <div class="product-detail">
                <span class="detail-icon">📍</span>
                <span><b>ቦታ፡</b> ቦሌ ክፍለ ከተማ</span>
            </div>
            
            <div class="product-detail">
                <span class="detail-icon">📏</span>
                <span><b>ስፋት፡</b> 200 ካሬ ሜትር</span>
            </div>
            
            <div class="product-detail">
                <span class="detail-icon">💰</span>
                <span><b>ዋጋ፡</b> <span class="price">15,000,000 ብር</span></span>
            </div>
            
            <div class="product-detail">
                <span class="detail-icon">📞</span>
                <span><b>ስልክ፡</b> 0911223344</span>
            </div>

            <div class="action-buttons">
                <a href="tel:+251911223344" class="btn btn-call">📞 አሁኑኑ ደውል</a>
                <a href="https://t.me/yitbarek6081" class="btn btn-msg">💬 በውስጥ መስመር</a>
            </div>
        </div>
    </div>

    <script>
        // ለቴሌግራም Mini App አኒሜሽን
        Telegram.WebApp.ready();
    </script>
</body>
</html>
