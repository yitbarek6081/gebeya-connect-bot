<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gebeya Connect | ገበያ ኮኔክት</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #0088cc, #005588); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: white;
        }
        .card { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            text-align: center; max-width: 400px; color: #333;
        }
        h1 { color: #0088cc; margin-bottom: 10px; }
        p { line-height: 1.6; font-size: 1.1rem; }
        .btn { 
            display: inline-block; margin-top: 25px; padding: 15px 30px; 
            background-color: #0088cc; color: white; 
            text-decoration: none; border-radius: 50px; 
            font-weight: bold; font-size: 1.1rem;
            transition: transform 0.2s, background 0.3s;
        }
        .btn:hover { 
            background-color: #006699; transform: scale(1.05);
        }
        .status { color: #2ecc71; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛍 ገበያ ኮኔክት</h1>
        <p>እንኳን በደህና መጡ! የቴሌግራም ቦታችን አሁን በስራ ላይ ነው። ዕቃ ለመግዛትም ሆነ ለመሸጥ ቦቱን ይጠቀሙ።</p>
        <div class="status">● ቦቱ አሁን ይሰራል</div>
        <a href="https://t.me/yite_gebeyaconnect_bot" class="btn">ወደ ቴሌግራም ሂድ</a>
    </div>
</body>
</html>
