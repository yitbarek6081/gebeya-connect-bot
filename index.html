<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gebeya Connect - የገበያ ዝርዝር</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .product-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .product-image { width: 100%; height: 220px; object-fit: cover; }
        .product-info { padding: 20px; }
        h1 { color: #333; font-size: 1.5rem; margin: 0 0 10px 0; border-bottom: 2px solid #0088cc; display: inline-block; }
        .detail { display: flex; align-items: center; margin-bottom: 10px; color: #555; font-size: 1rem; }
        .icon { color: #0088cc; margin-right: 12px; font-weight: bold; width: 20px; text-align: center; }
        .price-tag { background: #fff9db; color: #fab005; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: bold; text-decoration: none; text-align: center; color: white; transition: 0.3s; }
        .btn-call { background: #2ecc71; }
        .btn-msg { background: #0088cc; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750" class="product-image">
        <div class="product-info">
            <h1>🏠 ዘመናዊ መኖሪያ ቤት</h1>
            <div class="detail"><span class="icon">📍</span> <b>ቦታ:</b> ቦሌ ክፍለ ከተማ</div>
            <div class="detail"><span class="icon">📏</span> <b>ስፋት:</b> 200 ካሬ ሜትር</div>
            <div class="detail"><span class="icon">💰</span> <b>ዋጋ:</b> <span class="price-tag">15,000,000 ብር</span></div>
            <div class="buttons">
                <a href="tel:+251911223344" class="btn btn-call">📞 ደውል</a>
                <a href="https://t.me/yitbarek6081" class="btn btn-msg">💬 መልእክት</a>
            </div>
        </div>
    </div>
    <script>Telegram.WebApp.ready();</script>
</body>
</html>
