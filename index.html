<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ገበያ ኮኔክት</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; border-bottom: 2px solid #ddd; margin-bottom: 15px; }
        .tab { background: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .tab.active { background: #0088cc; color: white; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; padding: 15px; }
        .price { color: #f39c12; font-size: 1.3rem; font-weight: bold; margin: 10px 0; }
        .contact-box { background: #eef7fe; padding: 15px; border-radius: 12px; border: 1px dashed #0088cc; text-align: center; }
        .call-btn { display: block; background: #2ecc71; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="showCat('land')">🏘 መሬት</div>
        <div class="tab" onclick="showCat('house')">🏠 ቤት</div>
        <div class="tab" onclick="showCat('car')">🚗 መኪና</div>
        <div class="tab" onclick="showCat('tech')">🏗 ኤሌክትሮኒክስ</div>
    </div>

    <div id="content">
        <div class="card">
            <h3>🏘 መሬት የሚሸጥ</h3>
            <p>📍 ወልድያ | አራዳ<br>📐 200 ካሬ ሜትር</p>
            <div class="price">💰 2,500,000 ብር</div>
            <div class="contact-box">
                <p style="margin:0; font-size:0.9rem;">ለመግዛት አድሚኑን ያነጋግሩ፡</p>
                <b>0945880474</b>
                <a href="tel:0945880474" class="call-btn">📞 አሁኑኑ ደውል</a>
            </div>
        </div>
    </div>

    <script>
        function showCat(cat) {
            // እዚህ ጋር በምድብ የመለየት ስራ መስራት ይቻላል
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }
        Telegram.WebApp.ready();
    </script>
</body>
</html>
