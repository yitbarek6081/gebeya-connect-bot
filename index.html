<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ገበያ ኮኔክት</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 15px; }
        .tabs { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; }
        .tab { background: white; padding: 10px; border-radius: 15px; cursor: pointer; white-space: nowrap; }
        .active { background: #0088cc; color: white; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .price { color: orange; font-weight: bold; font-size: 1.2rem; }
        .btn { display: block; background: #2ecc71; color: white; text-align: center; padding: 10px; border-radius: 10px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active">🏘 መሬት</div>
        <div class="tab">🏠 ቤት</div>
        <div class="tab">🚗 መኪና</div>
        <div class="tab">🏗 ኤሌክትሮኒክስ</div>
    </div>
    <div id="items-container">መረጃ በመጫን ላይ...</div>

    <script>
        const SCRIPT_URL = "የእርስዎ_የስክሪፕት_ሊንክ_እዚህ";
        async function loadItems() {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const container = document.getElementById('items-container');
            container.innerHTML = data.map(item => `
                <div class="card">
                    <h3>${item[0]}</h3>
                    <p>📍 ${item[1]}, ${item[2]}<br>📐 ${item[3]}</p>
                    <div class="price">💰 ${item[4]}</div>
                    <a href="tel:0945880474" class="btn">📞 አሁኑኑ ደውል</a>
                </div>
            `).join('');
        }
        loadItems();
    </script>
</body>
</html>
